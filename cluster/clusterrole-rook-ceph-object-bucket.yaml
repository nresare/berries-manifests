# Source: rook
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: rook-ceph-object-bucket
  labels:
    operator: rook
    storage-backend: ceph
    app.kubernetes.io/name: rook-ceph
    app.kubernetes.io/instance: rook
    app.kubernetes.io/version: v1.20.1
    app.kubernetes.io/part-of: rook-ceph-operator
    app.kubernetes.io/created-by: helm
  annotations:
    noa.re/deploy-id: 5facaac310eef407
rules:
- apiGroups:
  - ''
  resources:
  - secrets
  - configmaps
  verbs:
  - get
  - create
  - update
  - delete
- apiGroups:
  - storage.k8s.io
  resources:
  - storageclasses
  verbs:
  - get
- apiGroups:
  - objectbucket.io
  resources:
  - objectbucketclaims
  verbs:
  - list
  - watch
  - get
  - update
- apiGroups:
  - objectbucket.io
  resources:
  - objectbuckets
  verbs:
  - list
  - watch
  - get
  - create
  - update
  - delete
- apiGroups:
  - objectbucket.io
  resources:
  - objectbucketclaims/status
  - objectbuckets/status
  verbs:
  - update
- apiGroups:
  - objectbucket.io
  resources:
  - objectbucketclaims/finalizers
  - objectbuckets/finalizers
  verbs:
  - update
