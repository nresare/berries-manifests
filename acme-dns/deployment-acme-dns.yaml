# Source: acme-dns
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acme-dns
  labels:
    app: acme-dns
  namespace: acme-dns
  annotations:
    noa.re/deploy-id: e39f4eeae63ca044
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: acme-dns
  template:
    metadata:
      labels:
        app: acme-dns
      annotations:
        checksum/config: 5f4ffd40b58163d6f26acd0ef93cab4e6da8705f8b6815d4e5671699181f40fd
    spec:
      volumes:
      - name: db
        persistentVolumeClaim:
          claimName: acme-dns
      - name: acme-dns-etc-acme-dns
        configMap:
          name: acme-dns-etc-acme-dns
      initContainers:
      - name: fix-db-permissions
        securityContext:
          allowPrivilegeEscalation: false
        image: alpine:3.24.1
        command:
        - sh
        - -c
        - mkdir -p /db/acme-dns && chown -R 65532:65532 /db/acme-dns
        volumeMounts:
        - mountPath: /db
          name: db
      containers:
      - name: acme-dns
        securityContext:
          allowPrivilegeEscalation: false
        image: nresare/acme-dns:v1.1-distroless
        volumeMounts:
        - mountPath: /db
          name: db
        - name: acme-dns-etc-acme-dns
          mountPath: /etc/acme-dns
        ports:
        - name: web
          containerPort: 1080
          protocol: TCP
        - name: dns-tcp
          containerPort: 1053
          protocol: TCP
        - name: dns
          containerPort: 1053
          protocol: UDP
      - name: dbg
        image: nresare/dbg:ubuntu
        command: ["/bin/sh", "-c", "while true; do sleep 1000; done;"]
        volumeMounts:
        - mountPath: /db
          name: db
