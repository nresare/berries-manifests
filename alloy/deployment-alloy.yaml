# Source: alloy
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy
  namespace: alloy
  labels:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/instance: alloy
    app.kubernetes.io/version: v1.17.0
    app.kubernetes.io/part-of: alloy
  annotations:
    noa.re/deploy-id: acd34097e9b7feaa
spec:
  replicas: 1
  minReadySeconds: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: alloy
      app.kubernetes.io/instance: alloy
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: alloy
        checksum/config: 273983581e27b26e36c483a83d14f0532540af3963f15264cb8c28c45b9e8d69
      labels:
        app.kubernetes.io/name: alloy
        app.kubernetes.io/instance: alloy
    spec:
      serviceAccountName: alloy
      containers:
      - name: alloy
        image: docker.io/grafana/alloy:v1.17.0
        imagePullPolicy: IfNotPresent
        args:
        - run
        - /etc/alloy/alloy.cfg
        - --storage.path=/tmp/alloy
        - --server.http.listen-addr=0.0.0.0:12345
        - --server.http.ui-path-prefix=/
        - --stability.level=generally-available
        env:
        - name: ALLOY_DEPLOY_MODE
          value: helm
        - name: HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: K8S_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        ports:
        - containerPort: 12345
          name: http-metrics
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 12345
            scheme: HTTP
          initialDelaySeconds: 10
          timeoutSeconds: 1
        volumeMounts:
        - name: config
          mountPath: /etc/alloy
      - name: config-reloader
        image: quay.io/prometheus-operator/prometheus-config-reloader:v0.91.0@sha256:7d9e4eea5f1139e602508871f422b0116c60e87c662f3dcd234d5ab60cd0d8c1
        imagePullPolicy: IfNotPresent
        args:
        - --watched-dir=/etc/alloy
        - --reload-url=http://localhost:12345/-/reload
        volumeMounts:
        - name: config
          mountPath: /etc/alloy
        resources:
          requests:
            cpu: 10m
            memory: 50Mi
      dnsPolicy: ClusterFirst
      volumes:
      - name: config
        configMap:
          name: alloy-config
