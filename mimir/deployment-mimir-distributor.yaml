# Source: mimir
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir-distributor
  labels:
    app.kubernetes.io/name: mimir
    app.kubernetes.io/instance: mimir
    app.kubernetes.io/component: distributor
    app.kubernetes.io/part-of: memberlist
    app.kubernetes.io/version: 3.1.2
  namespace: mimir
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mimir
      app.kubernetes.io/instance: mimir
      app.kubernetes.io/component: distributor
  strategy:
    rollingUpdate:
      maxSurge: 15%
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mimir
        app.kubernetes.io/instance: mimir
        app.kubernetes.io/version: 3.1.2
        app.kubernetes.io/component: distributor
        app.kubernetes.io/part-of: memberlist
      annotations:
        checksum/config: 77981946fef4aaf584516e09fe73fdb4134018b07a92c3028f97a55fc5d61d95
      namespace: mimir
    spec:
      serviceAccountName: mimir
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: distributor
        image: docker.io/grafana/mimir:3.1.2
        imagePullPolicy: IfNotPresent
        args:
        - -target=distributor
        - -config.expand-env=true
        - -config.file=/etc/mimir/mimir.yaml
        - -server.grpc.keepalive.max-connection-age=60s
        - -server.grpc.keepalive.max-connection-age-grace=5m
        - -server.grpc.keepalive.max-connection-idle=1m
        - -shutdown-delay=90s
        volumeMounts:
        - mountPath: /var/run/secrets/tokens
          name: tokens
          readOnly: true
        - name: config
          mountPath: /etc/mimir
        - name: runtime-config
          mountPath: /var/mimir
        - name: storage
          mountPath: /data
        - name: active-queries
          mountPath: /active-query-tracker
        ports:
        - name: http-metrics
          containerPort: 8080
          protocol: TCP
        - name: grpc
          containerPort: 9095
          protocol: TCP
        - name: memberlist
          containerPort: 7946
          protocol: TCP
        livenessProbe: null
        readinessProbe:
          httpGet:
            path: /ready
            port: http-metrics
          initialDelaySeconds: 45
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        env:
        - name: GOMAXPROCS
          value: '8'
        - name: AWS_ENDPOINT_URL
          value: http://rook-ceph-rgw-berries.rook-ceph.svc
        - name: AWS_ENDPOINT_URL_STS
          value: http://rook-ceph-rgw-berries.rook-ceph.svc
        - name: AWS_REGION
          value: us-east-1
        - name: AWS_ROLE_ARN
          value: arn:aws:iam:::role/mimir
        - name: AWS_WEB_IDENTITY_TOKEN_FILE
          value: /var/run/secrets/tokens/sts.amazonaws.com
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: mimir
            app.kubernetes.io/instance: mimir
            app.kubernetes.io/component: distributor
      terminationGracePeriodSeconds: 100
      volumes:
      - name: config
        configMap:
          name: mimir-config
          items:
          - key: mimir.yaml
            path: mimir.yaml
      - name: runtime-config
        configMap:
          name: mimir-runtime
      - name: tokens
        projected:
          sources:
          - serviceAccountToken:
              audience: sts.amazonaws.com
              expirationSeconds: 3600
              path: sts.amazonaws.com
      - name: storage
        emptyDir: {}
      - name: active-queries
        emptyDir: {}
