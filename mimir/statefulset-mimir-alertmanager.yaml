# Source: mimir
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mimir-alertmanager
  labels:
    app.kubernetes.io/name: mimir
    app.kubernetes.io/instance: mimir
    app.kubernetes.io/component: alertmanager
    app.kubernetes.io/part-of: memberlist
    app.kubernetes.io/version: 3.1.2
  namespace: mimir
  annotations:
    noa.re/deploy-id: 30198252cd9f2f9c
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mimir
      app.kubernetes.io/instance: mimir
      app.kubernetes.io/component: alertmanager
  updateStrategy:
    type: RollingUpdate
  serviceName: mimir-alertmanager
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: storage
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mimir
        app.kubernetes.io/instance: mimir
        app.kubernetes.io/version: 3.1.2
        app.kubernetes.io/component: alertmanager
        app.kubernetes.io/part-of: memberlist
      annotations:
        checksum/config: ca3fa0223d534209d9b95f89006443c17225f9dec9a24a94a7b3b44c23d160d3
        checksum/alertmanager-fallback-config: dd58832d251f465490ee4f1da92af4f0df7ad38331c87e55451cbd78936df760
      namespace: mimir
    spec:
      serviceAccountName: mimir
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: mimir
            app.kubernetes.io/instance: mimir
            app.kubernetes.io/component: alertmanager
      terminationGracePeriodSeconds: 900
      volumes:
      - name: config
        configMap:
          name: mimir-config
          items:
          - key: mimir.yaml
            path: mimir.yaml
      - name: runtime-config
        configMap:
          name: mimir-runtime
      - name: tmp
        emptyDir: {}
      - name: active-queries
        emptyDir: {}
      - name: alertmanager-fallback-config
        configMap:
          name: mimir-alertmanager-fallback-config
      - name: tokens
        projected:
          sources:
          - serviceAccountToken:
              audience: sts.amazonaws.com
              expirationSeconds: 3600
              path: sts.amazonaws.com
      containers:
      - name: alertmanager
        image: docker.io/grafana/mimir:3.1.2
        imagePullPolicy: IfNotPresent
        args:
        - -target=alertmanager
        - -config.expand-env=true
        - -config.file=/etc/mimir/mimir.yaml
        - -server.http-idle-timeout=6m
        volumeMounts:
        - mountPath: /var/run/secrets/tokens
          name: tokens
          readOnly: true
        - name: config
          mountPath: /etc/mimir
        - name: runtime-config
          mountPath: /var/mimir
        - name: storage
          mountPath: /data
        - name: alertmanager-fallback-config
          mountPath: /configs/
        - name: tmp
          mountPath: /tmp
        - name: active-queries
          mountPath: /active-query-tracker
        ports:
        - name: http-metrics
          containerPort: 8080
          protocol: TCP
        - name: grpc
          containerPort: 9095
          protocol: TCP
        - name: memberlist
          containerPort: 7946
          protocol: TCP
        livenessProbe: null
        readinessProbe:
          httpGet:
            path: /ready
            port: http-metrics
          initialDelaySeconds: 45
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        env:
        - name: AWS_ENDPOINT_URL
          value: http://rook-ceph-rgw-berries.rook-ceph.svc
        - name: AWS_ENDPOINT_URL_STS
          value: http://rook-ceph-rgw-berries.rook-ceph.svc
        - name: AWS_REGION
          value: us-east-1
        - name: AWS_ROLE_ARN
          value: arn:aws:iam:::role/mimir
        - name: AWS_WEB_IDENTITY_TOKEN_FILE
          value: /var/run/secrets/tokens/sts.amazonaws.com
