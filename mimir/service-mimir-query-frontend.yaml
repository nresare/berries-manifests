# Source: mimir
apiVersion: v1
kind: Service
metadata:
  name: mimir-query-frontend
  labels:
    app.kubernetes.io/name: mimir
    app.kubernetes.io/instance: mimir
    app.kubernetes.io/component: query-frontend
    app.kubernetes.io/version: 3.1.2
  namespace: mimir
spec:
  type: ClusterIP
  internalTrafficPolicy: Cluster
  ports:
  - port: 8080
    protocol: TCP
    name: http-metrics
    targetPort: http-metrics
  - port: 9095
    protocol: TCP
    name: grpc
    targetPort: grpc
  selector:
    app.kubernetes.io/name: mimir
    app.kubernetes.io/instance: mimir
    app.kubernetes.io/component: query-frontend
