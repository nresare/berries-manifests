# Source: mimir
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mimir-store-gateway-zone-b
  labels:
    app.kubernetes.io/name: mimir
    app.kubernetes.io/instance: mimir
    app.kubernetes.io/component: store-gateway
    app.kubernetes.io/part-of: memberlist
    app.kubernetes.io/version: 3.1.2
    name: store-gateway-zone-b
    rollout-group: store-gateway
    zone: zone-b
    grafana.com/prepare-downscale: 'true'
    grafana.com/min-time-between-zones-downscale: 30m
  annotations:
    rollout-max-unavailable: '50'
    grafana.com/prepare-downscale-http-path: store-gateway/prepare-shutdown
    grafana.com/prepare-downscale-http-port: '8080'
    grafana.com/rollout-downscale-leader: mimir-store-gateway-zone-a
  namespace: mimir
spec:
  podManagementPolicy: OrderedReady
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mimir
      app.kubernetes.io/instance: mimir
      app.kubernetes.io/component: store-gateway
      rollout-group: store-gateway
      zone: zone-b
  updateStrategy:
    type: OnDelete
  serviceName: mimir-store-gateway-headless
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: storage
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 2Gi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mimir
        app.kubernetes.io/instance: mimir
        app.kubernetes.io/version: 3.1.2
        app.kubernetes.io/component: store-gateway
        app.kubernetes.io/part-of: memberlist
        name: store-gateway-zone-b
        rollout-group: store-gateway
        zone: zone-b
      annotations:
        checksum/config: 77981946fef4aaf584516e09fe73fdb4134018b07a92c3028f97a55fc5d61d95
      namespace: mimir
    spec:
      serviceAccountName: mimir
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: mimir
            app.kubernetes.io/instance: mimir
            app.kubernetes.io/component: store-gateway
      terminationGracePeriodSeconds: 120
      volumes:
      - name: config
        configMap:
          name: mimir-config
          items:
          - key: mimir.yaml
            path: mimir.yaml
      - name: runtime-config
        configMap:
          name: mimir-runtime
      - name: tokens
        projected:
          sources:
          - serviceAccountToken:
              audience: sts.amazonaws.com
              expirationSeconds: 3600
              path: sts.amazonaws.com
      - name: active-queries
        emptyDir: {}
      containers:
      - name: store-gateway
        image: docker.io/grafana/mimir:3.1.2
        imagePullPolicy: IfNotPresent
        args:
        - -target=store-gateway
        - -config.expand-env=true
        - -config.file=/etc/mimir/mimir.yaml
        - -store-gateway.sharding-ring.instance-availability-zone=zone-b
        - -server.grpc-max-send-msg-size-bytes=209715200
        volumeMounts:
        - mountPath: /var/run/secrets/tokens
          name: tokens
          readOnly: true
        - name: config
          mountPath: /etc/mimir
        - name: runtime-config
          mountPath: /var/mimir
        - name: storage
          mountPath: /data
        - name: active-queries
          mountPath: /active-query-tracker
        ports:
        - name: http-metrics
          containerPort: 8080
          protocol: TCP
        - name: grpc
          containerPort: 9095
          protocol: TCP
        - name: memberlist
          containerPort: 7946
          protocol: TCP
        livenessProbe: null
        readinessProbe:
          httpGet:
            path: /ready
            port: http-metrics
          initialDelaySeconds: 60
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        env:
        - name: GOMAXPROCS
          value: '5'
        - name: GOMEMLIMIT
          value: '536870912'
        - name: AWS_ENDPOINT_URL
          value: http://rook-ceph-rgw-berries.rook-ceph.svc
        - name: AWS_ENDPOINT_URL_STS
          value: http://rook-ceph-rgw-berries.rook-ceph.svc
        - name: AWS_REGION
          value: us-east-1
        - name: AWS_ROLE_ARN
          value: arn:aws:iam:::role/mimir
        - name: AWS_WEB_IDENTITY_TOKEN_FILE
          value: /var/run/secrets/tokens/sts.amazonaws.com
