apiVersion: apps/v1
kind: Deployment
metadata:
  name: idmouse
  labels:
    app: idmouse
  namespace: idmouse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: idmouse
  template:
    metadata:
      labels:
        app: idmouse
      annotations:
        checksum/config: 3a6ffc60feb926f94720b240a010193443706fde5767cf91b09eb49b7a79e3c9
    spec:
      serviceAccountName: idmouse
      containers:
      - name: idmouse
        image: repo.noa.re/idmouse:0.2.1-e068163b:0.2.1-e068163b
        ports:
        - name: http
          containerPort: 8080
        volumeMounts:
        - name: idmouse-config
          mountPath: /config
      volumes:
      - name: idmouse-config
        configMap:
          name: idmouse-config
