# Source: idmouse
apiVersion: apps/v1
kind: Deployment
metadata:
  name: idmouse
  labels:
    app: idmouse
  namespace: idmouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: idmouse
  template:
    metadata:
      labels:
        app: idmouse
    spec:
      volumes:
      - name: config
        configMap:
          name: idmouse-config
      containers:
      - name: idmouse
        securityContext:
          allowPrivilegeEscalation: false
        image: packages.buildkite.com/nresare/idmouse/idmouse:0.2.1-9003cca4
        ports:
        - name: http
          containerPort: 8080
        volumeMounts:
        - mountPath: /config
          name: config
