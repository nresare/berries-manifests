# Source: idmouse
apiVersion: apps/v1
kind: Deployment
metadata:
  name: idmouse
  labels:
    app: idmouse
  namespace: idmouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: idmouse
  template:
    metadata:
      labels:
        app: idmouse
      annotations:
        checksum/config: 72a5c0c3e3b602104ba99a454f15ebe4d7a3bb0acd7fbf91fab269e0f4e47b7b
    spec:
      containers:
      - name: idmouse
        securityContext:
          allowPrivilegeEscalation: false
        image: packages.buildkite.com/nresare/idmouse/idmouse:0.2.1-9003cca4
        ports:
        - name: http
          containerPort: 8080
        volumeMounts:
        - name: idmouse-config
          mountPath: /config
      volumes:
      - name: idmouse-config
        configMap:
          name: idmouse-config
