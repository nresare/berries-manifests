# Source: id.noa.re
apiVersion: apps/v1
kind: Deployment
metadata:
  name: id-noa-re
  labels:
    app: id-noa-re
  namespace: idelephant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: id-noa-re
  template:
    metadata:
      labels:
        app: id-noa-re
    spec:
      containers:
      - name: id-noa-re
        image: packages.buildkite.com/nresare/idelephant/idelephant:v0.2.3-rc.19-g85d4992
        args:
        - -c
        - /config/idelephant.toml
        volumeMounts:
        - name: id-noa-re-config
          mountPath: /config
        - name: db-password
          mountPath: /db-password
        - name: email-password
          mountPath: /email-password
        - name: tokens
          mountPath: /var/run/secrets/tokens
          readOnly: true
      volumes:
      - name: id-noa-re-config
        configMap:
          name: id-noa-re-config
      - name: db-password
        secret:
          secretName: db-password
      - name: email-password
        secret:
          secretName: email-password
      - name: tokens
        projected:
          sources:
          - serviceAccountToken:
              path: custom-token
              expirationSeconds: 3600
              audience: idmouse
