apiVersion: v1
kind: Service
metadata:
  name: loki-gateway
  namespace: loki
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/instance: loki
    app.kubernetes.io/version: 3.7.3
    app.kubernetes.io/component: gateway
    prometheus.io/service-monitor: 'false'
  annotations: null
spec:
  type: ClusterIP
  ports:
