# Source: argo
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-argocd-notifications-controller
  namespace: argo
  labels:
    app.kubernetes.io/name: argocd-notifications-controller
    app.kubernetes.io/instance: argo
    app.kubernetes.io/component: notifications-controller
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/version: v3.4.4
rules:
- apiGroups:
  - argoproj.io
  resources:
  - applications
  - appprojects
  verbs:
  - get
  - list
  - watch
  - update
  - patch
- apiGroups:
  - ''
  resources:
  - configmaps
  - secrets
  verbs:
  - list
  - watch
- apiGroups:
  - ''
  resourceNames:
  - argocd-notifications-cm
  resources:
  - configmaps
  verbs:
  - get
- apiGroups:
  - ''
  resourceNames:
  - argocd-notifications-secret
  resources:
  - secrets
  verbs:
  - get
