# Source: rook
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ceph-csi-controller-manager
  namespace: rook-ceph
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: ceph-csi
    app.kubernetes.io/instance: rook
    app.kubernetes.io/version: v1.0.4
  annotations:
    noa.re/deploy-id: d3e30562295f8ee9
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: ceph-csi-op-controller-manager
      app.kubernetes.io/name: ceph-csi
      app.kubernetes.io/instance: rook
  template:
    metadata:
      labels:
        control-plane: ceph-csi-op-controller-manager
        app.kubernetes.io/name: ceph-csi
        app.kubernetes.io/instance: rook
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      containers:
      - args:
        - --leader-elect
        command:
        - /manager
        env:
        - name: OPERATOR_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: CSI_SERVICE_ACCOUNT_PREFIX
          value: ''
        - name: WATCH_NAMESPACE
          value: ''
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: cluster.local
        image: quay.io/cephcsi/ceph-csi-operator:v1.0.4
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
      imagePullSecrets: []
      nodeSelector: {}
      priorityClassName: null
      securityContext:
        runAsNonRoot: true
      serviceAccountName: ceph-csi
      terminationGracePeriodSeconds: 10
      tolerations: []
      topologySpreadConstraints: []
