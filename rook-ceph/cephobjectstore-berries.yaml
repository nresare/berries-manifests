apiVersion: ceph.rook.io/v1
kind: CephObjectStore
metadata:
  name: berries
  namespace: rook-ceph
  annotations:
    noa.re/deploy-id: 6f14a16104fcefea
spec:
  metadataPool:
    failureDomain: host
    replicated:
      size: 3
  dataPool:
    failureDomain: host
    erasureCoded:
      dataChunks: 2
      codingChunks: 1
  preservePoolsOnDelete: true
  gateway:
    port: 80
    instances: 2
