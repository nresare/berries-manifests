# Source: repo.noa.re
apiVersion: apps/v1
kind: Deployment
metadata:
  name: repo-noa-re
  labels:
    app: repo-noa-re
  namespace: reposnake
spec:
  replicas: 1
  selector:
    matchLabels:
      app: repo-noa-re
  template:
    metadata:
      labels:
        app: repo-noa-re
      annotations:
        checksum/config: 3e353e07759c3c510b03b2215a86f74a7876277a96e2e11cca0bdbe56c1b293a
    spec:
      containers:
      - name: repo-noa-re
        image: nresare/reposnake:0.1.3
        args:
        - -c
        - /config/reposnake.toml
        volumeMounts:
        - name: repo-noa-re-config
          mountPath: /config
        - name: data
          mountPath: /data
        - name: tokens
          mountPath: /var/run/secrets/tokens
          readOnly: true
      volumes:
      - name: repo-noa-re-config
        configMap:
          name: repo-noa-re-config
      - name: data
        persistentVolumeClaim:
          claimName: repo-noa-re-data
      - name: tokens
        projected:
          sources:
          - serviceAccountToken:
              path: idmouse
              expirationSeconds: 3600
              audience: idmouse
      initContainers:
      - name: fix-data-permissions
        image: alpine:3.23.4
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - mkdir -p /data && chown -R 65532:65532 /data
        resources: {}
        securityContext:
          allowPrivilegeEscalation: false
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - name: data
          mountPath: /data
