# Source: repo.noa.re
apiVersion: v1
kind: ConfigMap
metadata:
  name: repo-noa-re-config
  namespace: reposnake
data:
  reposnake.toml: |
    bind_address = "0.0.0.0:8080"
    storage_directory = "/data"
    max_upload_bytes = 104857600

    [authentication]
    audience = "repo.noa.re"
    issuer = "https://k8s.noa.re"

    [[publisher]]
    name = "ci"
    projects = ["*"]
    required_claims = {sub="system:serviceaccount:default:default"}

    [persistence]
    uri = "ws://surrealdb.surrealdb:8000"

    [persistence.idmouse]
    url = "http://idmouse.idmouse.svc/token/reposnake"
    token_path = "/var/run/secrets/tokens/idmouse"
