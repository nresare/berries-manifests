apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-resare-com
  labels:
    app: demo-resare-com
  namespace: oidc-client-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-resare-com
  template:
    metadata:
      labels:
        app: demo-resare-com
      annotations:
        checksum/config: 86cf78da2a3ecaea05865da21de1e75216d363c1bc9d2b61c9725192d475069c
    spec:
      containers:
      - name: demo-resare-com
        image: repo.noa.re/oidc-client-demo:0.1.0-fdf14815
        args:
        - -c
        - /config/config.toml
        volumeMounts:
        - name: demo-resare-com-config
          mountPath: /config
      volumes:
      - name: demo-resare-com-config
        configMap:
          name: demo-resare-com-config
