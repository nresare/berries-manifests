# Source: relcoord.noa.re
apiVersion: v1
kind: ConfigMap
metadata:
  name: relcoord-noa-re-config
  namespace: relcoord
data:
  relcoord.toml: |
    host = "0.0.0.0"
    port = 8080

    [persistence]
    uri = "ws://surrealdb.surrealdb.svc:8000"
    namespace = "default"
    database = "relcoord"

    [persistence.idmouse]
    url = "http://idmouse.idmouse.svc/token/relcoord"
    token-path = "/var/run/secrets/tokens/idmouse"

    [[role]]
    name = "manual"
    audience = "relcoord.noa.re"
    issuer = "https://k8s.noa.re"
    claims = { sub = "system:serviceaccount:default:default" }

    [[role]]
    name = "buildkite"
    audience = "repo.noa.re"
    issuer = "https://agent.buildkite.com"
    claims = {organization_slug="nresare"}

    [idcat]
    endpoint = "https://idcat.noa.re"
    github-app = "nresare-buildsystem"
    token-path = "/var/run/secrets/tokens/idcat.noa.re"
