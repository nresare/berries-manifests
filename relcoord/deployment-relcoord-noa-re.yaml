# Source: relcoord.noa.re
apiVersion: apps/v1
kind: Deployment
metadata:
  name: relcoord-noa-re
  labels:
    app: relcoord-noa-re
  namespace: relcoord
spec:
  replicas: 2
  selector:
    matchLabels:
      app: relcoord-noa-re
  template:
    metadata:
      labels:
        app: relcoord-noa-re
      annotations:
        checksum/config: 21a5c7d38bbd1ba8c69a70088c6f3cb9b9ce9a0c1f9dcfce56aa907a43c0b9b1
    spec:
      containers:
      - name: relcoord-noa-re
        image: repo.noa.re/relcoord:0.1.0-281c6fcd
        volumeMounts:
        - name: relcoord-noa-re-config
          mountPath: /config
        - name: tokens
          mountPath: /var/run/secrets/tokens
          readOnly: true
      volumes:
      - name: relcoord-noa-re-config
        configMap:
          name: relcoord-noa-re-config
      - name: tokens
        projected:
          sources:
          - serviceAccountToken:
              path: idmouse
              expirationSeconds: 3600
              audience: idmouse
