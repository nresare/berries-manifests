# Source: grafana-operator
apiVersion: v1
kind: Service
metadata:
  name: grafana-operator-metrics-service
  namespace: grafana
  labels:
    app.kubernetes.io/name: grafana-operator
    app.kubernetes.io/instance: grafana-operator
    app.kubernetes.io/version: v5.24.0
    app.kubernetes.io/part-of: grafana-operator
    app.kubernetes.io/component: operator
spec:
  type: ClusterIP
  ports:
  - port: 9090
    targetPort: metrics
    protocol: TCP
    name: metrics
  - port: 8888
    targetPort: pprof
    protocol: TCP
    name: pprof
  selector:
    app.kubernetes.io/name: grafana-operator
    app.kubernetes.io/instance: grafana-operator
