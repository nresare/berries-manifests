# Source: grafana-operator
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: grafana
  annotations:
    noa.re/deploy-id: 2325c5de448faeab
spec:
  persistentVolumeClaim:
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
  service:
    metadata:
      labels:
        noa.re/discover: enabled
      annotations:
        teleport.dev/name: grafana
  deployment:
    spec:
      strategy:
        type: Recreate
      template:
        spec:
          volumes:
          - name: grafana-data
            persistentVolumeClaim:
              claimName: grafana-pvc
  config:
    security:
      csrf_trusted_origins: grafana.teleport.noa.re
    server:
      root_url: https://grafana.teleport.noa.re
