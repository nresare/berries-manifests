# Source: demo.resare.com
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: demo-resare-com
  namespace: demo
spec:
  dnsNames:
  - demo.resare.com
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
  privateKey:
    algorithm: ECDSA
    rotationPolicy: Always
  secretName: demo-resare-com-tls
